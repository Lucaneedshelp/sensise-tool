<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensise Terminbuchung</title>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="app.css?v=10">
</head>
<body>
  <div class="container app-shell">
    <div class="app-topbar">
      <a class="btn btn-secondary" href="../../index.html">Zurück zur Startseite</a>
      <div class="brand-lockup">
        <img class="brand-logo" src="../../assets/img/sensise-logo-neg.png" alt="Sensise Logo">
      </div>
    </div>

    <header class="hero">
      <div>
        <span class="eyebrow">Kalender</span>
        <h1>Termin buchen</h1>
      </div>
      <div class="hero-facts" aria-label="Buchungsrahmen">
        <span>30-60 Minuten</span>
        <span>Termine 08:00-16:00 Uhr</span>
        <span>bis zu 3 Vorschläge</span>
        <span>Werktage</span>
      </div>
    </header>

    <main class="booking-layout">
      <div class="hidden-settings" aria-hidden="true">
        <input id="ics-url" type="url">
        <input id="owner-email" type="email" value="luca-jon.georg@thermokon.de">
        <select id="range-days"><option value="14" selected>14 Tage</option></select>
        <input id="work-start" type="time" value="07:00">
        <input id="work-end" type="time" value="17:00">
        <input id="booking-start" type="time" value="08:00">
        <input id="booking-end" type="time" value="16:00">
        <button id="load-btn" type="button">Kalender laden</button>
        <input id="ics-file" type="file" accept=".ics,text/calendar">
      </div>

      <section class="panel slots-panel">
        <div class="section-head calendar-head">
          <div>
            <h2>Kalender</h2>
            <p id="slots-meta">Wähle bis zu drei Terminvorschläge aus.</p>
          </div>
          <div class="calendar-actions">
            <button class="calendar-nav-btn" id="prev-week" type="button">‹</button>
            <button class="calendar-today-btn" id="today-week" type="button">Heute</button>
            <button class="calendar-nav-btn" id="next-week" type="button">›</button>
            <div id="status" class="status">Kalender wird geladen...</div>
          </div>
        </div>

        <div id="calendar-board" class="calendar-board"></div>
        <div id="slots-list" class="slots-list"></div>
      </section>

      <aside class="panel booking-panel">
        <div class="booking-card-head">
          <div>
            <h2>Buchungsanfrage</h2>
          </div>
          <div id="selected-slot-label" class="selected-slot">Noch kein Termin ausgewählt.</div>
        </div>

        <form id="booking-form" class="booking-form">
          <label>
            <span>Dauer</span>
            <select id="duration">
              <option value="30" selected>30 Minuten</option>
              <option value="45">45 Minuten</option>
              <option value="60">60 Minuten</option>
            </select>
          </label>
          <label>
            <span>Name *</span>
            <input id="requester-name" required placeholder="Vor- und Nachname">
          </label>
          <label>
            <span>E-Mail *</span>
            <input id="requester-email" type="email" required placeholder="name@firma.de">
          </label>
          <label>
            <span>Firma</span>
            <input id="requester-company" placeholder="Unternehmen">
          </label>
          <label>
            <span>Thema *</span>
            <input id="meeting-topic" required placeholder="Worum geht es?">
          </label>
          <label>
            <span>Nachricht</span>
            <textarea id="meeting-note" rows="5" placeholder="Kurzinfo, Projekt, Link oder Rückfragen"></textarea>
          </label>

          <div class="booking-actions">
            <button class="btn btn-primary" id="mail-request" type="submit" disabled>Anfrage per Mail</button>
          </div>
        </form>
      </aside>
    </main>
  </div>

  <script src="app.js?v=15"></script>
</body>
</html>
