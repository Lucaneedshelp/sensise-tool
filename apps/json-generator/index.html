<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensise JSON Generator</title>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="container app-shell">
    <div class="app-topbar">
      <div class="brand-lockup">
        <img class="brand-logo" src="../../assets/img/sensise-logo-neg.png" alt="Sensise Logo">
      </div>
      <a class="btn btn-secondary" href="../../index.html">Zurueck zur Startseite</a>
    </div>

    <header class="hero panel">
      <div class="hero-head">
        <div>
          <h1>Excel oder CSV zu Sensise JSON</h1>
        </div>
        <span class="hero-note">Lokal im Browser</span>
      </div>

      <div class="drop-panel">
        <div class="drop-copy">
          <h2>Datei auswaehlen</h2>
          <div class="format-list" aria-label="Unterstuetzte Dateiformate">
            <span class="format-pill">XLSX</span>
            <span class="format-pill">XLS</span>
            <span class="format-pill">CSV</span>
          </div>
        </div>
        <div class="drop-actions">
          <input type="file" id="file-input" accept=".xlsx,.xls,.csv,text/csv" hidden>
          <button class="btn btn-primary" id="file-trigger">Datei auswaehlen</button>
          <span id="status-msg" class="status-msg">Noch keine Datei geladen</span>
        </div>
      </div>
    </header>

    <section class="panel" id="mapping-section" hidden>
      <div class="section-head app-section-head">
        <h2>Felder zuordnen</h2>
      </div>
      <div class="mapping-grid" id="mapping-grid"></div>
      <div class="mapping-actions">
        <label class="toggle-row">
          <span>onMap</span>
          <select id="on-map-val">
            <option value="false">false</option>
            <option value="true">true</option>
          </select>
        </label>
        <button class="btn btn-primary" id="build-btn">JSON generieren</button>
      </div>
    </section>

    <section class="stats-grid" id="stats-bar" hidden>
      <article class="stat-card">
        <span>Geraete gesamt</span>
        <strong id="stat-total">0</strong>
      </article>
      <article class="stat-card">
        <span>Vollstaendig</span>
        <strong id="stat-ok">0</strong>
      </article>
      <article class="stat-card">
        <span>Warnungen</span>
        <strong id="stat-warn">0</strong>
      </article>
    </section>

    <section class="panel" id="preview-section" hidden>
      <div class="preview-head">
        <div>
          <h2>JSON Vorschau</h2>
          <p id="preview-meta">Noch keine Ausgabe</p>
        </div>
        <div class="preview-actions">
          <label class="filename-row" for="file-name-input">
            <span>Dateiname</span>
            <input type="text" id="file-name-input" placeholder="sensise_devices">
          </label>
          <button class="btn btn-secondary" id="copy-btn">Kopieren</button>
          <button class="btn btn-primary" id="download-btn">JSON herunterladen</button>
        </div>
      </div>
      <div id="error-box" class="error-box" hidden></div>
      <pre id="json-preview" class="json-preview"></pre>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
